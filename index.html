<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bansuri — Indian Flute Tutor</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-deep:      #06060f;
      --bg-card:      #0d0d1f;
      --bg-card2:     #111128;
      --gold:         #e8b84b;
      --gold-light:   #ffd166;
      --teal:         #06d6a0;
      --red:          #ff4d6d;
      --blue:         #4cc9f0;
      --text-bright:  #f0ede6;
      --text-mid:     #9e9bbf;
      --text-dim:     #4a4870;
      --border:       rgba(232,184,75,0.15);
      --font-display: 'Cinzel', serif;
      --font-body:    'Rajdhani', sans-serif;
      --font-mono:    'Orbitron', monospace;
    }
    html { font-size: 16px; }
    body { background:var(--bg-deep); color:var(--text-bright); font-family:var(--font-body); min-height:100vh; overflow-x:hidden; }

    .bg-grid { position:fixed; inset:0; z-index:0; background-image:linear-gradient(rgba(232,184,75,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(232,184,75,0.04) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; }
    .bg-glow { position:fixed; z-index:0; border-radius:50%; filter:blur(90px); pointer-events:none; }
    .bg-glow--top    { width:600px; height:400px; top:-120px; left:50%; transform:translateX(-50%); background:radial-gradient(ellipse,rgba(6,214,160,0.08),transparent 70%); }
    .bg-glow--bottom { width:500px; height:350px; bottom:-100px; left:50%; transform:translateX(-50%); background:radial-gradient(ellipse,rgba(232,184,75,0.07),transparent 70%); }

    /* AUTH */
    #auth-screen { position:relative; z-index:10; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem; }
    .auth-card { background:var(--bg-card); border:1px solid var(--border); border-radius:20px; padding:2.5rem 2rem; width:100%; max-width:400px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.7); position:relative; overflow:hidden; }
    .auth-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold),var(--teal),var(--gold)); background-size:200% 100%; animation:slide-gradient 4s linear infinite; }
    .auth-logo { font-size:3rem; color:var(--gold); text-shadow:0 0 30px rgba(232,184,75,0.6); animation:pulse-gold 3s ease-in-out infinite; }
    .auth-title { font-family:var(--font-display); font-size:2rem; font-weight:900; letter-spacing:0.25em; color:var(--gold-light); text-shadow:0 0 30px rgba(232,184,75,0.4); margin:0.2rem 0; }
    .auth-subtitle { font-size:0.72rem; letter-spacing:0.3em; color:var(--text-mid); text-transform:uppercase; }
    .auth-ornament { display:flex; align-items:center; justify-content:center; gap:0.6rem; margin:0.9rem 0 1.5rem; }
    .auth-ornament span { display:block; height:1px; width:60px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
    .auth-ornament .dot { color:var(--gold); font-size:0.6rem; width:auto; }
    .auth-tabs { display:flex; gap:0.5rem; background:var(--bg-deep); border-radius:999px; padding:4px; margin-bottom:1.25rem; border:1px solid var(--border); }
    .auth-tab { flex:1; padding:0.5rem; border:none; border-radius:999px; background:transparent; color:var(--text-dim); font-family:var(--font-mono); font-size:0.55rem; letter-spacing:0.15em; cursor:pointer; transition:all 0.25s; }
    .auth-tab.active { background:rgba(232,184,75,0.12); color:var(--gold-light); box-shadow:0 0 12px rgba(232,184,75,0.2); }
    .auth-input { display:block; width:100%; padding:0.85rem 1rem; margin-bottom:0.75rem; background:var(--bg-deep); border:1px solid var(--border); border-radius:10px; color:var(--text-bright); font-family:var(--font-body); font-size:1rem; outline:none; transition:border-color 0.2s; }
    .auth-input:focus { border-color:var(--gold); }
    .auth-input::placeholder { color:var(--text-dim); }
    .auth-message { min-height:1.4em; font-size:0.8rem; margin-bottom:0.75rem; letter-spacing:0.03em; padding:0 0.25rem; }
    .auth-message.error   { color:var(--red); }
    .auth-message.success { color:var(--teal); }
    .auth-message.info    { color:var(--text-mid); }
    .auth-btn { width:100%; padding:0.9rem; background:transparent; border:2px solid var(--gold); border-radius:999px; color:var(--gold-light); font-family:var(--font-display); font-size:0.85rem; letter-spacing:0.2em; cursor:pointer; transition:all 0.25s; }
    .auth-btn:hover { box-shadow:0 0 25px rgba(232,184,75,0.3); background:rgba(232,184,75,0.06); }
    .auth-footer-note { margin-top:1.25rem; font-family:var(--font-display); font-size:0.6rem; letter-spacing:0.3em; color:var(--text-dim); }

    /* USER BAR */
    .user-bar { position:relative; z-index:5; display:flex; align-items:center; justify-content:flex-end; gap:0.75rem; padding:0.6rem 1.25rem; background:rgba(13,13,31,0.8); border-bottom:1px solid var(--border); }
    .user-bar__email { font-family:var(--font-mono); font-size:0.6rem; color:var(--text-dim); letter-spacing:0.08em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px; }
    .user-bar__signout { padding:0.3rem 0.8rem; background:transparent; border:1px solid var(--text-dim); border-radius:6px; color:var(--text-mid); font-family:var(--font-body); font-size:0.72rem; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .user-bar__signout:hover { border-color:var(--red); color:var(--red); }

    /* APP */
    .app-wrapper { position:relative; z-index:1; max-width:780px; margin:0 auto; padding:2rem 1.25rem 3rem; display:flex; flex-direction:column; gap:1.75rem; }
    .header { text-align:center; padding-top:1rem; }
    .header__symbol { font-size:3.5rem; color:var(--gold); line-height:1; text-shadow:0 0 30px rgba(232,184,75,0.6); animation:pulse-gold 3s ease-in-out infinite; }
    .header__title { font-family:var(--font-display); font-size:clamp(2.2rem,8vw,4rem); font-weight:900; letter-spacing:0.25em; color:var(--gold-light); text-shadow:0 0 40px rgba(232,184,75,0.5); margin:0.2rem 0 0.3rem; }
    .header__subtitle { font-weight:300; letter-spacing:0.35em; font-size:0.8rem; color:var(--text-mid); text-transform:uppercase; }
    .header__ornament { display:flex; align-items:center; justify-content:center; gap:0.6rem; margin-top:0.9rem; }
    .header__ornament span { display:block; height:1px; width:80px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
    .header__ornament .dot { color:var(--gold); font-size:0.6rem; width:auto; text-shadow:0 0 8px var(--gold); }
    .visualizer-section { position:relative; background:var(--bg-card); border:1px solid var(--border); border-radius:12px; overflow:hidden; height:100px; box-shadow:inset 0 0 30px rgba(0,0,0,0.5); }
    .waveform-canvas { width:100%; height:100%; display:block; }
    .visualizer-label { position:absolute; top:8px; left:12px; font-family:var(--font-mono); font-size:0.55rem; letter-spacing:0.2em; color:var(--teal); opacity:0.6; }
    .tuner-section { display:flex; justify-content:center; }
    .tuner { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:1.5rem 2rem 1rem; width:100%; max-width:360px; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,0.5); }
    .tuner__arc-wrap { position:relative; display:inline-block; }
    .tuner__svg { width:100%; max-width:300px; display:block; }
    .tuner__cents { font-family:var(--font-mono); font-size:1.1rem; color:var(--teal); margin-top:-0.5rem; letter-spacing:0.1em; text-shadow:0 0 12px var(--teal); }
    .tuner__labels { display:flex; justify-content:space-between; align-items:center; margin-top:0.6rem; font-family:var(--font-mono); font-size:0.55rem; letter-spacing:0.15em; }
    .label-flat { color:var(--red); opacity:0.8; }
    .label-in   { color:var(--teal); font-size:0.7rem; font-weight:700; text-shadow:0 0 10px var(--teal); }
    .label-sharp{ color:var(--blue); opacity:0.8; }
    .note-display-section { width:100%; }
    .note-card { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:2rem 1.5rem 1.75rem; text-align:center; position:relative; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.5); }
    .note-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold),var(--teal),var(--gold)); background-size:200% 100%; animation:slide-gradient 4s linear infinite; }
    .note-card__swarname { font-family:var(--font-display); font-size:clamp(4rem,16vw,7rem); font-weight:700; line-height:1; color:var(--teal); text-shadow:0 0 60px rgba(6,214,160,0.5); letter-spacing:0.05em; transition:all 0.2s ease; min-height:1.1em; }
    .note-card__swarname.correct { color:var(--teal); text-shadow:0 0 80px rgba(6,214,160,0.8); }
    .note-card__swarname.wrong   { color:var(--red);  text-shadow:0 0 80px rgba(255,77,109,0.8); }
    .note-card__info { display:flex; justify-content:space-around; margin-top:1.25rem; padding-top:1.25rem; border-top:1px solid var(--border); gap:0.5rem; flex-wrap:wrap; }
    .info-block { display:flex; flex-direction:column; align-items:center; gap:0.3rem; flex:1; min-width:80px; }
    .info-block__label { font-family:var(--font-mono); font-size:0.5rem; letter-spacing:0.2em; color:var(--text-dim); }
    .info-block__value { font-family:var(--font-mono); font-size:1rem; font-weight:700; color:var(--gold-light); }
    .info-block__value--freq { color:var(--blue); font-size:0.9rem; }
    #feedbackText.correct { color:var(--teal); }
    #feedbackText.wrong   { color:var(--red); }
    .scale-section { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:1.5rem; box-shadow:0 8px 40px rgba(0,0,0,0.4); }
    .scale-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.75rem; margin-bottom:1.25rem; }
    .scale-title { font-family:var(--font-display); font-size:0.75rem; letter-spacing:0.2em; color:var(--gold); font-weight:700; }
    .toggle-wrap { display:flex; align-items:center; gap:0.6rem; cursor:pointer; }
    .toggle-wrap input { display:none; }
    .toggle-track { width:44px; height:24px; background:var(--bg-deep); border:1px solid var(--border); border-radius:999px; position:relative; transition:background 0.3s; }
    .toggle-thumb { position:absolute; top:3px; left:3px; width:16px; height:16px; border-radius:50%; background:var(--text-dim); transition:transform 0.3s,background 0.3s; }
    .toggle-wrap input:checked + .toggle-track { background:rgba(6,214,160,0.15); border-color:var(--teal); }
    .toggle-wrap input:checked + .toggle-track .toggle-thumb { transform:translateX(20px); background:var(--teal); box-shadow:0 0 8px var(--teal); }
    .toggle-label { font-family:var(--font-mono); font-size:0.55rem; letter-spacing:0.15em; color:var(--text-mid); }
    .scale-notes { display:grid; grid-template-columns:repeat(7,1fr); gap:0.5rem; }
    .swar-btn { background:var(--bg-card2); border:1px solid var(--border); border-radius:10px; padding:0.75rem 0.25rem; text-align:center; }
    .swar-btn__name { font-family:var(--font-display); font-size:clamp(1rem,3vw,1.4rem); color:var(--text-mid); display:block; transition:color 0.2s; }
    .swar-btn__western { font-family:var(--font-mono); font-size:0.5rem; color:var(--text-dim); display:block; margin-top:0.3rem; letter-spacing:0.1em; }
    .swar-btn.active { border-color:var(--gold); background:rgba(232,184,75,0.08); box-shadow:0 0 16px rgba(232,184,75,0.2); }
    .swar-btn.active .swar-btn__name { color:var(--gold-light); }
    .swar-btn.matched { border-color:var(--teal); background:rgba(6,214,160,0.1); box-shadow:0 0 16px rgba(6,214,160,0.3); animation:flash-match 0.4s ease; }
    .swar-btn.matched .swar-btn__name { color:var(--teal); }
    .scale-progress { margin-top:1.25rem; padding-top:1.25rem; border-top:1px solid var(--border); }
    .scale-progress__text { font-size:0.9rem; color:var(--text-mid); margin-bottom:0.75rem; text-align:center; }
    .target-note { font-family:var(--font-display); color:var(--gold-light); font-size:1.1rem; text-shadow:0 0 12px rgba(232,184,75,0.5); }
    .scale-progress__bar-wrap { height:6px; background:var(--bg-deep); border-radius:999px; overflow:hidden; border:1px solid var(--border); }
    .scale-progress__bar { height:100%; width:0%; background:linear-gradient(90deg,var(--teal),var(--gold)); border-radius:999px; transition:width 0.5s ease; box-shadow:0 0 10px rgba(6,214,160,0.5); }
    .controls-section { text-align:center; }
    .btn-main { display:inline-flex; align-items:center; gap:0.75rem; padding:1rem 2.5rem; background:transparent; border:2px solid var(--gold); border-radius:999px; color:var(--gold-light); font-family:var(--font-display); font-size:0.9rem; letter-spacing:0.2em; cursor:pointer; transition:all 0.25s; }
    .btn-main:hover { box-shadow:0 0 30px rgba(232,184,75,0.35); transform:scale(1.03); }
    .btn-main:active { transform:scale(0.97); }
    .btn-main.active { border-color:var(--red); color:var(--red); box-shadow:0 0 30px rgba(255,77,109,0.3); }
    .btn-main__icon { font-size:1rem; }
    .mic-hint { margin-top:0.75rem; font-size:0.72rem; color:var(--text-dim); letter-spacing:0.08em; }
    .footer { text-align:center; font-family:var(--font-display); font-size:0.7rem; letter-spacing:0.3em; color:var(--text-dim); padding-top:0.5rem; }

    @keyframes pulse-gold { 0%,100%{text-shadow:0 0 20px rgba(232,184,75,0.4);}50%{text-shadow:0 0 50px rgba(232,184,75,0.9),0 0 80px rgba(232,184,75,0.3);} }
    @keyframes slide-gradient { 0%{background-position:0% 0;}100%{background-position:200% 0;} }
    @keyframes flash-match { 0%{opacity:1;}50%{opacity:0.4;}100%{opacity:1;} }
    @media(max-width:520px){ .scale-notes{grid-template-columns:repeat(4,1fr);} .btn-main{padding:0.85rem 1.75rem;font-size:0.8rem;} }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--top"></div>
  <div class="bg-glow bg-glow--bottom"></div>

  <!-- LOGIN SCREEN -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">𝄞</div>
      <h1 class="auth-title">BANSURI</h1>
      <p class="auth-subtitle">Indian Flute Pitch Tutor</p>
      <div class="auth-ornament"><span></span><span class="dot">◆</span><span></span></div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabSignIn"  onclick="switchTab('signin')">SIGN IN</button>
        <button class="auth-tab"        id="tabSignUp"  onclick="switchTab('signup')">NEW ACCOUNT</button>
      </div>

      <input id="auth-email"    type="email"    placeholder="Email address"          class="auth-input" />
      <input id="auth-password" type="password" placeholder="Password (min 6 chars)" class="auth-input" />
      <p id="auth-message" class="auth-message"></p>
      <button class="auth-btn" onclick="handleAuth()"><span id="authBtnText">SIGN IN</span></button>
      <p class="auth-footer-note">Sa · Re · Ga · Ma · Pa · Dha · Ni</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app-screen" style="display:none;">
    <div class="user-bar">
      <span class="user-bar__email" id="userEmailDisplay"></span>
      <button class="user-bar__signout" onclick="handleSignOut()">Sign Out</button>
    </div>
    <div class="app-wrapper">
      <header class="header">
        <div class="header__symbol">𝄞</div>
        <h1 class="header__title">BANSURI</h1>
        <p class="header__subtitle">Indian Flute Pitch Tutor</p>
        <div class="header__ornament"><span></span><span class="dot">◆</span><span></span></div>
      </header>

      <section class="visualizer-section">
        <canvas id="waveformCanvas" class="waveform-canvas"></canvas>
        <div class="visualizer-label">LIVE AUDIO</div>
      </section>

      <section class="tuner-section">
        <div class="tuner">
          <div class="tuner__arc-wrap">
            <svg class="tuner__svg" viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
              <path d="M 20 150 A 130 130 0 0 1 280 150" fill="none" stroke="#1a1a2e" stroke-width="14" stroke-linecap="round"/>
              <path d="M 20 150 A 130 130 0 0 1 90 38"   fill="none" stroke="#ff4d6d" stroke-width="8"  stroke-linecap="round" opacity="0.5"/>
              <path d="M 90 38  A 130 130 0 0 1 150 20"  fill="none" stroke="#ffd166" stroke-width="8"  stroke-linecap="round" opacity="0.5"/>
              <path d="M 150 20 A 130 130 0 0 1 210 38"  fill="none" stroke="#06d6a0" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
              <path d="M 210 38 A 130 130 0 0 1 280 150" fill="none" stroke="#ffd166" stroke-width="8"  stroke-linecap="round" opacity="0.5"/>
              <line x1="150" y1="22" x2="150" y2="38" stroke="#06d6a0" stroke-width="2.5"/>
              <line x1="90"  y1="40" x2="97"  y2="54" stroke="#ffd166" stroke-width="1.5" opacity="0.7"/>
              <line x1="210" y1="40" x2="203" y2="54" stroke="#ffd166" stroke-width="1.5" opacity="0.7"/>
              <line x1="20"  y1="150" x2="35" y2="144" stroke="#ff4d6d" stroke-width="1.5" opacity="0.7"/>
              <line x1="280" y1="150" x2="265" y2="144" stroke="#ff4d6d" stroke-width="1.5" opacity="0.7"/>
              <line id="tunerNeedle" x1="150" y1="140" x2="150" y2="30"
                stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"
                style="transform-origin:150px 140px;transform:rotate(0deg);transition:transform 0.15s ease;"/>
              <circle cx="150" cy="140" r="6" fill="#06d6a0"/>
              <circle cx="150" cy="140" r="3" fill="#0a0a1a"/>
            </svg>
            <div class="tuner__cents" id="tunerCents">0¢</div>
          </div>
          <div class="tuner__labels">
            <span class="label-flat">♭ FLAT</span>
            <span class="label-in" id="tunerStatus">—</span>
            <span class="label-sharp">SHARP ♯</span>
          </div>
        </div>
      </section>

      <section class="note-display-section">
        <div class="note-card">
          <div class="note-card__swarname" id="swarName">—</div>
          <div class="note-card__info">
            <div class="info-block">
              <span class="info-block__label">NOTE</span>
              <span class="info-block__value" id="westernNote">—</span>
            </div>
            <div class="info-block">
              <span class="info-block__label">FREQUENCY</span>
              <span class="info-block__value info-block__value--freq" id="freqDisplay">— Hz</span>
            </div>
            <div class="info-block">
              <span class="info-block__label">STATUS</span>
              <span class="info-block__value" id="feedbackText">—</span>
            </div>
          </div>
        </div>
      </section>

      <section class="scale-section">
        <div class="scale-header">
          <h2 class="scale-title">SAPTAK — Scale Practice</h2>
          <label class="toggle-wrap">
            <input type="checkbox" id="scaleModeToggle" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-label">SCALE MODE</span>
          </label>
        </div>
        <div class="scale-notes" id="scaleNotes"></div>
        <div class="scale-progress" id="scaleProgress" style="display:none">
          <p class="scale-progress__text">Now play: <span id="targetNoteName" class="target-note">Sa</span></p>
          <div class="scale-progress__bar-wrap">
            <div class="scale-progress__bar" id="scaleProgressBar"></div>
          </div>
        </div>
      </section>

      <section class
section class="controls-section">
        <button class="btn-main" id="startStopBtn">
          <span class="btn-main__icon" id="btnIcon">▶</span>
          <span id="btnText">START PRACTICE</span>
        </button>
        <p class="mic-hint" id="micHint">Allow microphone access when prompted</p>
      </section>

      <footer class="footer">Sa · Re · Ga · Ma · Pa · Dha · Ni · Sa</footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
